<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Lead Gen SaaS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    background: #0b0e14;
    color: #e8edf5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 24px;
}
.container { max-width: 1100px; width: 100%; }
h1 {
    font-size: 2rem;
    font-weight: 700;
    background: linear-gradient(135deg, #a78bfa, #60a5fa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-align: center;
    margin-bottom: 8px;
}
.subtitle { text-align: center; color: #94a3b8; margin-bottom: 32px; font-size: 0.95rem; }
.card {
    background: #141a24;
    border: 1px solid #2a3345;
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 24px;
}
.form-row { display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-end; }
.form-group { flex: 1; min-width: 180px; }
.form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: #94a3b8; margin-bottom: 6px; }
.form-group input {
    width: 100%;
    padding: 12px 16px;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 10px;
    color: #e8edf5;
    font-size: 0.95rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
}
.form-group input:focus { border-color: #7c3aed; }
.btn {
    padding: 12px 28px;
    border: none;
    border-radius: 10px;
    font-weight: 600;
    font-size: 0.95rem;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.2s, transform 0.15s;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: linear-gradient(135deg, #7c3aed, #4f46e5); color: #fff; }
.btn-primary:hover { opacity: 0.92; }
.btn-secondary { background: #1e293b; color: #e8edf5; border: 1px solid #334155; }
.btn-secondary:hover { background: #263548; }
.btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-row { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
.spinner { display: none; width: 20px; height: 20px; border: 2px solid #334155; border-top-color: #a78bfa; border-radius: 50%; animation: spin 0.7s linear infinite; margin-left: 10px; }
@keyframes spin { to { transform: rotate(360deg); } }
.status { margin: 12px 0; font-size: 0.9rem; color: #94a3b8; }
table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
thead th { text-align: left; padding: 12px 14px; background: #1e293b; color: #94a3b8; font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #2a3345; }
tbody td { padding: 12px 14px; border-bottom: 1px solid #1e293b; vertical-align: top; }
tbody tr:hover { background: rgba(124, 58, 237, 0.04); }
.email-cell { max-width: 360px; word-break: break-word; font-size: 0.83rem; color: #cbd5e1; line-height: 1.5; }
.phone-cell { white-space: nowrap; color: #94a3b8; }
.empty { text-align: center; padding: 48px 0; color: #475569; font-size: 0.95rem; }
.error-msg { color: #f87171; font-size: 0.9rem; margin-top: 8px; }
</style>
</head>
<body>
<div class="container">
    <h1>AI Lead Gen SaaS</h1>
    <p class="subtitle">Scrape local business listings and generate AI cold emails in seconds.</p>

    <div class="card">
        <div class="form-row">
            <div class="form-group">
                <label for="city">City</label>
                <input id="city" type="text" placeholder="e.g. Miami" value="Miami">
            </div>
            <div class="form-group">
                <label for="niche">Niche</label>
                <input id="niche" type="text" placeholder="e.g. Roofers" value="Roofers">
            </div>
            <button class="btn btn-primary" id="generateBtn" onclick="generate()">Generate Leads</button>
        </div>
        <div class="status" id="status"></div>
        <div class="error-msg" id="errorMsg"></div>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:8px;">
            <h2 style="font-size:1.1rem; font-weight:600;">Results</h2>
            <div class="btn-row" style="margin:0;">
                <button class="btn btn-secondary" id="downloadBtn" onclick="downloadCSV()" disabled>Download CSV</button>
            </div>
        </div>
        <div id="spinner" class="spinner" style="margin:0 auto 16px;"></div>
        <div id="tableWrap">
            <table>
                <thead><tr><th>Business Name</th><th>Phone</th><th>AI Email</th></tr></thead>
                <tbody id="tbody"><tr><td class="empty" colspan="3">Enter a city and niche, then click Generate Leads.</td></tr></tbody>
            </table>
        </div>
    </div>
</div>

<script>
let leadsData = [];

async function generate() {
    const city = document.getElementById('city').value.trim();
    const niche = document.getElementById('niche').value.trim();
    if (!city || !niche) { document.getElementById('errorMsg').textContent = 'Please fill in both fields.'; return; }

    const btn = document.getElementById('generateBtn');
    const spinner = document.getElementById('spinner');
    const status = document.getElementById('status');
    const errorMsg = document.getElementById('errorMsg');
    const tbody = document.getElementById('tbody');
    const downloadBtn = document.getElementById('downloadBtn');

    btn.disabled = true;
    spinner.style.display = 'inline-block';
    status.textContent = 'Scraping listings and generating emails...';
    errorMsg.textContent = '';
    tbody.innerHTML = '<tr><td class="empty" colspan="3">Loading...</td></tr>';
    downloadBtn.disabled = true;

    try {
        const resp = await fetch('/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ city, niche })
        });
        if (!resp.ok) {
            const err = await resp.json();
            throw new Error(err.error || 'Request failed');
        }
        leadsData = await resp.json();
        renderTable(leadsData);
        status.textContent = `Found ${leadsData.length} leads.`;
        downloadBtn.disabled = false;
    } catch (e) {
        errorMsg.textContent = e.message;
        tbody.innerHTML = '<tr><td class="empty" colspan="3">No results found. Try a different city or niche.</td></tr>';
        status.textContent = '';
    } finally {
        btn.disabled = false;
        spinner.style.display = 'none';
    }
}

function renderTable(data) {
    const tbody = document.getElementById('tbody');
    if (!data.length) {
        tbody.innerHTML = '<tr><td class="empty" colspan="3">No results found.</td></tr>';
        return;
    }
    tbody.innerHTML = data.map(b => `
        <tr>
            <td><strong>${escapeHtml(b.business_name)}</strong></td>
            <td class="phone-cell">${escapeHtml(b.phone)}</td>
            <td class="email-cell">${escapeHtml(b.ai_email)}</td>
        </tr>
    `).join('');
}

function downloadCSV() {
    if (!leadsData.length) return;
    const rows = [['Business Name','Phone','AI Email']];
    leadsData.forEach(b => rows.push([b.business_name, b.phone, b.ai_email]));
    const csv = rows.map(r => r.map(c => '"' + c.replace(/"/g, '""') + '"').join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    const city = document.getElementById('city').value.trim().replace(/\s+/g, '_');
    const niche = document.getElementById('niche').value.trim().replace(/\s+/g, '_');
    a.download = `${niche}_${city}_leads.csv`;
    a.click();
    URL.revokeObjectURL(a.href);
}

function escapeHtml(s) {
    if (!s) return '';
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}
</script>
</body>
</html>
